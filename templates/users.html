<!DOCTYPE html>
<html>
<head>
  <title>User Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand">User Management</span>
  <a href="/dashboard" class="btn btn-light btn-sm">Back</a>
</nav>

<div class="container mt-4">

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="POST" class="mb-4">
  <div class="row">
    <div class="col-md-4">
      <input class="form-control" name="username" placeholder="Username" required>
    </div>
    <div class="col-md-4">
      <input class="form-control" type="password" name="password" placeholder="Password" required>
    </div>
    <div class="col-md-4">
      <button class="btn btn-success w-100">Add User</button>
    </div>
  </div>
</form>

<table class="table">
  <thead>
    <tr>
      <th>User</th>
      <th>Role</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for u in users %}
    <tr>
      <td>{{u}}</td>
      <td>{{users[u].role}}</td>
      <td>
        {% if u != session.user %}
        <a href="/delete_user/{{u}}" class="btn btn-danger btn-sm"
           onclick="return confirm('Delete user {{u}}?')">Delete</a>
        {% endif %}
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

</div>
</body>
</html>
