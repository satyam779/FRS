<!DOCTYPE html>
<html lang="en">
<head>
  <title>Webcam Attendance</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #eef3ff, #f9fbff); min-height: 100vh; }
    .card { border-radius: 18px; }
    #video { width: 100%; max-width: 400px; border-radius: 12px; }
    #canvas { display: none; }
    .result-box { min-height: 60px; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary px-3">
  <span class="navbar-brand fw-bold">Webcam Attendance</span>
  <a href="/dashboard" class="btn btn-sm btn-outline-light">Back</a>
</nav>

<div class="container mt-4">
  
  <div class="row justify-content-center">
    <div class="col-md-6">
      
      <div class="card mb-3">
        <div class="card-body text-center">
          <video id="video" autoplay muted playsinline></video>
          <canvas id="canvas"></canvas>
          <div class="mt-2">
            <button id="startBtn" class="btn btn-success">Start Camera</button>
          </div>
          <div id="status" class="text-muted mt-2">Click Start Camera</div>
        </div>
      </div>

      <div class="card mb-3">
        <div class="card-body text-center">
          <div class="mb-3">
            <div class="btn-group" role="group" aria-label="Entry Type">
              <input type="radio" class="btn-check" name="entryType" id="entryIn" value="IN" autocomplete="off">
              <label class="btn btn-outline-success" for="entryIn">IN</label>

              <input type="radio" class="btn-check" name="entryType" id="entryOut" value="OUT" autocomplete="off">
              <label class="btn btn-outline-danger" for="entryOut">OUT</label>
            </div>
          </div>
          <div id="result" class="result-box alert alert-secondary">
            <strong>Ready</strong>
          </div>
          <button id="scanBtn" class="btn btn-primary btn-lg w-100" disabled>Scan Now</button>
        </div>
      </div>

      <div class="card">
        <div class="card-body text-center">
          <a href="/webcam_enroll" class="btn btn-outline-primary">Enroll New Face</a>
        </div>
      </div>

    </div>
  </div>

</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const startBtn = document.getElementById("startBtn");
const scanBtn = document.getElementById("scanBtn");
const status = document.getElementById("status");
const result = document.getElementById("result");

let stream = null;

startBtn.addEventListener("click", async () => {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: "user", width: 640, height: 480 } 
    });
    video.srcObject = stream;
    await video.play();
    startBtn.disabled = true;
    startBtn.textContent = "Camera On";
    status.textContent = "Camera ready - Choose IN/OUT and click Scan Now";
    scanBtn.disabled = false;
  } catch (err) {
    status.innerHTML = '<span class="text-danger">Error: ' + err.message + '</span>';
  }
});

function capture() {
  if (!video.videoWidth || !video.videoHeight) {
    throw new Error("Camera frame is not ready. Please wait and try again.");
  }
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);
  return canvas.toDataURL("image/jpeg").split(",")[1];
}

scanBtn.addEventListener("click", async () => {
  if (!stream) return;
  const selectedEntry = document.querySelector('input[name="entryType"]:checked');
  if (!selectedEntry) {
    result.className = "result-box alert alert-warning";
    result.innerHTML = "Please choose IN or OUT before scanning";
    return;
  }
  
  let image = "";
  try {
    image = capture();
  } catch (err) {
    result.className = "result-box alert alert-warning";
    result.innerHTML = err.message;
    return;
  }
  status.textContent = "Processing...";
  result.className = "result-box alert alert-info";
  result.innerHTML = "Processing...";
  scanBtn.disabled = true;
  
  try {
    const resp = await fetch("/webcam_attend", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ image, entry: selectedEntry.value })
    });
    if (!resp.ok) {
      throw new Error("Server error: " + resp.status);
    }
    const data = await resp.json();
    console.log("Response:", data);
    
    if (data.status === "ATTENDANCE_MARKED") {
      result.className = "result-box alert alert-success";
      result.innerHTML = `<strong>${data.name}</strong> - ${data.entry} (${data.confidence}%)`;
      status.textContent = "Done - Ready for next scan";
    } else if (data.status === "NO_FACE") {
      result.className = "result-box alert alert-warning";
      result.innerHTML = "No face detected";
      status.textContent = "Try again";
    } else if (data.status === "UNKNOWN") {
      result.className = "result-box alert alert-danger";
      result.innerHTML = "Unknown face - Please enroll first";
      status.textContent = "Try again";
    } else if (data.status === "ALREADY_MARKED") {
      result.className = "result-box alert alert-info";
      result.innerHTML = `${data.name} already marked as ${data.entry} recently`;
      status.textContent = "Try again";
    } else if (data.status === "INVALID_ENTRY") {
      result.className = "result-box alert alert-warning";
      result.innerHTML = "Please choose IN or OUT";
      status.textContent = "Try again";
    } else {
      result.className = "result-box alert alert-secondary";
      result.innerHTML = data.status;
      status.textContent = "Try again";
    }
  } catch (err) {
    result.className = "result-box alert alert-danger";
    result.innerHTML = "Error: " + err.message;
  }
  
  scanBtn.disabled = false;
});
</script>

</body>
</html>
