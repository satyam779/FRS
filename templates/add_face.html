<!DOCTYPE html>
<html>
<head>
  <title>Add Face</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow mx-auto" style="max-width:400px;">
    <div class="card-body">
      <h5 class="text-center mb-3">Add Face</h5>

      <form method="POST" enctype="multipart/form-data">
        <input class="form-control mb-3" name="name" placeholder="Name" required>
        <input class="form-control mb-3" type="file" name="image" accept="image/*" required>
        <button class="btn btn-success w-100">Save</button>
      </form>

      <a href="/faces" class="btn btn-link w-100 mt-2">Back</a>
    </div>
  </div>
</div>

</body>
</html>
