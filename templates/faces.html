<!DOCTYPE html>
<html>
<head>
  <title>Faces</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand">Enrolled Faces</span>
  <a href="/dashboard" class="btn btn-light btn-sm">Back</a>
</nav>

<div class="container mt-4">

  <a href="/add_face" class="btn btn-primary mb-3">Add Face</a>

  <div class="row">
    {% for u in users %}
    <div class="col-md-3 mb-3">
      <div class="card text-center shadow-sm">
        <div class="card-body">
          <h6>{{ u }}</h6>
          <form method="POST" action="/delete_face" class="d-inline">
            <input type="hidden" name="name" value="{{ u }}">
            <button type="submit" class="btn btn-danger btn-sm"
                    onclick="return confirm('Delete this face?')">Delete</button>
          </form>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>

</div>
</body>
</html>
