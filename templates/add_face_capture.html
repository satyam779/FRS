<!DOCTYPE html>
<html>
<head>
  <title>Add Face – Live Capture</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand">📸 Live Face Capture</span>
  <a href="/faces" class="btn btn-sm btn-light">Back</a>
</nav>

<div class="container mt-4">

  <div class="card shadow-lg mx-auto" style="max-width: 520px;">
    <div class="card-body">

      <h5 class="text-center mb-3">Capture 5 Face Images</h5>

      <div class="mb-3">
        <label class="form-label">Person Name</label>
        <input id="name" class="form-control" placeholder="Enter name">
      </div>

      <div class="text-center mb-3">
        <video id="video" autoplay playsinline
               class="rounded border"
               style="width:100%; max-height:300px;"></video>
      </div>

      <div id="status" class="alert alert-info text-center py-2">
        Camera Ready
      </div>

      <div class="d-grid">
        <button class="btn btn-primary btn-lg"
                onclick="startCapture()">
          📷 Start Capture
        </button>
      </div>

      <form method="POST" enctype="multipart/form-data" id="form">
        <input type="hidden" name="name" id="hiddenName">
      </form>

    </div>
  </div>

</div>

<script>
const video = document.getElementById("video");
const form = document.getElementById("form");
const hiddenName = document.getElementById("hiddenName");
const statusBox = document.getElementById("status");

let streamRef = null;

// Start camera safely
async function startCamera() {
  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    try {
      streamRef = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = streamRef;
    } catch (err) {
      alert("Camera blocked. Use http://localhost:5000 or HTTPS.");
    }
  } else {
    alert("Camera not supported in this browser");
  }
}

startCamera();

function startCapture() {
  const name = document.getElementById("name").value.trim();
  if (!name) {
    alert("Please enter name");
    return;
  }

  hiddenName.value = name;
  form.innerHTML = '<input type="hidden" name="name" value="'+name+'">';

  let count = 0;
  statusBox.className = "alert alert-warning text-center";
  statusBox.innerHTML = "Capturing...";

  const interval = setInterval(() => {

    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext("2d").drawImage(video, 0, 0);

    canvas.toBlob(blob => {
      const file = new File([blob], `img_${count+1}.jpg`, { type: "image/jpeg" });

      const input = document.createElement("input");
      input.type = "file";
      input.name = "images";

      const dt = new DataTransfer();
      dt.items.add(file);
      input.files = dt.files;

      form.appendChild(input);
    }, "image/jpeg");

    count++;
    statusBox.innerHTML = "Captured " + count + " / 5";

    if (count === 5) {
      clearInterval(interval);

      // Stop camera
      if (streamRef) {
        streamRef.getTracks().forEach(track => track.stop());
      }

      statusBox.className = "alert alert-success text-center";
      statusBox.innerHTML = "Upload Complete!";

      setTimeout(() => form.submit(), 800);
    }

  }, 800); // 0.8 second gap for better face variation
}
</script>

</body>
</html>
