<!DOCTYPE html>
<html>
<head>
  <title>{{name}} Attendance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-primary px-3">
  <span class="navbar-brand">{{name}} Attendance</span>
  <a href="/attendance" class="btn btn-light btn-sm">Back</a>
</nav>

<div class="container mt-4">
  <table class="table table-bordered">
    <thead>
      <tr>
        <th>Date</th>
        <th>IN</th>
        <th>OUT</th>
        <th>Work</th>
      </tr>
    </thead>
    <tbody>
      {% for r in records %}
      <tr>
        <td>{{r.Date}}</td>
        <td>{{r.In}}</td>
        <td>{{r.Out}}</td>
        <td>{{r.Work}}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

  <a href="/export/{{name}}" class="btn btn-success">Export CSV</a>
</div>

</body>
</html>
